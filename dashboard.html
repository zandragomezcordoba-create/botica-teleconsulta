<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Botica Teleconsulta</title>

    <!-- Materialize CSS -->
    <link rel="stylesheet" href="css/materialize.min.css">

    <!-- Iconos Material -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body class="grey lighten-4">

    <!-- NAVBAR -->
    <nav class="light-blue lighten-1">
        <div class="nav-wrapper container">
            <a href="#" class="brand-logo left">
                <i class="material-icons">local_hospital</i>
                Botica Teleconsulta
            </a>
        </div>
    </nav>

    <div class="container">
        <br>
        <h4 class="center-align">Panel Principal</h4>
        <br>

        <div class="row">

            <!-- PACIENTES -->
            <div class="col s12 m6 l3">
                <div class="card light-blue lighten-1 white-text center">
                    <div class="card-content">
                        <i class="material-icons large">person_add</i>
                        <span class="card-title">Pacientes</span>
                    </div>
                    <div class="card-action white">
                        <a href="registro.html" class="light-blue-text text-darken-2">Ingresar</a>
                    </div>
                </div>
            </div>

            <!-- TELECONSULTA -->
            <div class="col s12 m6 l3">
                <div class="card light-blue lighten-1 white-text center">
                    <div class="card-content">
                        <i class="material-icons large">videocam</i>
                        <span class="card-title">Teleconsulta</span>
                    </div>
                    <div class="card-action white">
                        <a href="teleconsulta.html" class="light-blue-text text-darken-2">Ingresar</a>
                    </div>
                </div>
            </div>

            <!-- REPORTES -->
            <div class="col s12 m6 l3">
                <div class="card light-blue lighten-1 white-text center">
                    <div class="card-content">
                        <i class="material-icons large">assessment</i>
                        <span class="card-title">Reportes</span>
                    </div>
                    <div class="card-action white">
                        <a href="reportes.html" class="light-blue-text text-darken-2">Ingresar</a>
                    </div>
                </div>
            </div>

            <!-- MEDICAMENTOS -->
            <div class="col s12 m6 l3">
                <div class="card light-blue lighten-1 white-text center">
                    <div class="card-content">
                        <i class="material-icons large">medication</i>
                        <span class="card-title">Medicamentos</span>
                    </div>
                    <div class="card-action white">
                        <a href="medicamentos.html" class="light-blue-text text-darken-2">Ingresar</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Materialize JS -->
    <script src="js/materialize.min.js"></script>

</body>
</html>
